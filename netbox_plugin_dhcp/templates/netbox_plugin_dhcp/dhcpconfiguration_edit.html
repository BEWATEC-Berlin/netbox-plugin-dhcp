{% extends 'generic/object_edit.html' %}

{% block javascript %}
{{ block.super }}
<script>
(function () {
    async function fetchIpAddress(id) {
        const response = await fetch(`/api/ipam/ip-addresses/${id}/`);
        if (!response.ok) {
            return null;
        }
        return await response.json();
    }

    async function fetchFirstVmIpAddress(vmId) {
        const response = await fetch(`/api/ipam/ip-addresses/?virtual_machine_id=${vmId}&limit=1`);
        if (!response.ok) {
            return null;
        }
        const payload = await response.json();
        if (!payload || !payload.results || !payload.results.length) {
            return null;
        }
        return payload.results[0];
    }

    async function fetchVirtualMachine(id) {
        const response = await fetch(`/api/virtualization/virtual-machines/${id}/`);
        if (!response.ok) {
            return null;
        }
        return await response.json();
    }

    function extractObjectId(value) {
        if (!value) return null;
        if (typeof value === 'number') return value;
        if (typeof value === 'object' && value.id) return value.id;
        return null;
    }

    function extractVrfIdFromIpObject(ipObject) {
        if (!ipObject || !ipObject.vrf) return '';
        if (typeof ipObject.vrf === 'object') {
            return ipObject.vrf.id || '';
        }
        return ipObject.vrf;
    }

    async function resolveVmVrfId(vmData, vmId) {
        if (!vmData) return '';

        const primaryIp4 = vmData.primary_ip4;
        const primaryIp4Vrf = extractVrfIdFromIpObject(primaryIp4);
        if (primaryIp4Vrf) {
            return primaryIp4Vrf;
        }

        const primaryIp = vmData.primary_ip;
        const primaryIpVrf = extractVrfIdFromIpObject(primaryIp);
        if (primaryIpVrf) {
            return primaryIpVrf;
        }

        const primaryIp4Id = extractObjectId(primaryIp4);
        if (primaryIp4Id) {
            const primaryIp4Data = await fetchIpAddress(primaryIp4Id);
            const vrfFromPrimaryIp4 = extractVrfIdFromIpObject(primaryIp4Data);
            if (vrfFromPrimaryIp4) {
                return vrfFromPrimaryIp4;
            }
        }

        const primaryIpId = extractObjectId(primaryIp);
        if (primaryIpId) {
            const primaryIpData = await fetchIpAddress(primaryIpId);
            const vrfFromPrimaryIp = extractVrfIdFromIpObject(primaryIpData);
            if (vrfFromPrimaryIp) {
                return vrfFromPrimaryIp;
            }
        }

        const firstVmIp = await fetchFirstVmIpAddress(vmId);
        return extractVrfIdFromIpObject(firstVmIp);
    }

    function triggerSelectRefresh(id) {
        const field = document.getElementById(id);
        if (!field) return;
        field.value = null;
        if (typeof $ !== 'undefined') {
            $(field).val(null).trigger('change');
        }
    }

    async function updateVrfFromConnectServer() {
        const connectServerField = document.getElementById('id_connect_server');
        const vrfField = document.getElementById('id_connect_server_vrf');
        const selectedPrefixField = document.getElementById('id_selected_prefix');
        if (!connectServerField || !vrfField) return;

        const vmId = connectServerField.value;
        if (!vmId) {
            vrfField.value = '';
            if (selectedPrefixField) selectedPrefixField.value = '';
            triggerSelectRefresh('id_prefix');
            triggerSelectRefresh('id_address_range');
            triggerSelectRefresh('id_router');
            triggerSelectRefresh('id_dns_servers');
            return;
        }

        const vmData = await fetchVirtualMachine(vmId);
        const vrfId = await resolveVmVrfId(vmData, vmId);

        if (String(vrfField.value) !== String(vrfId || '')) {
            vrfField.value = vrfId || '';
            if (selectedPrefixField) selectedPrefixField.value = '';
            triggerSelectRefresh('id_prefix');
            triggerSelectRefresh('id_address_range');
            triggerSelectRefresh('id_router');
            triggerSelectRefresh('id_dns_servers');
        }
    }

    function onPrefixChanged() {
        const prefixField = document.getElementById('id_prefix');
        const selectedPrefixField = document.getElementById('id_selected_prefix');
        if (prefixField && selectedPrefixField) {
            const option = prefixField.options[prefixField.selectedIndex];
            selectedPrefixField.value = option ? option.text.trim() : '';
        }
        triggerSelectRefresh('id_address_range');
    }

    document.addEventListener('DOMContentLoaded', function () {
        const connectServerField = document.getElementById('id_connect_server');
        const prefixField = document.getElementById('id_prefix');
        if (!connectServerField) return;

        connectServerField.addEventListener('change', updateVrfFromConnectServer);
        if (typeof $ !== 'undefined') {
            $(connectServerField).on('select2:select select2:clear', updateVrfFromConnectServer);
            if (prefixField) {
                $(prefixField).on('select2:select select2:clear', onPrefixChanged);
            }
        }
        if (prefixField) {
            prefixField.addEventListener('change', onPrefixChanged);
        }
        updateVrfFromConnectServer();
    });
})();
</script>
{% endblock javascript %}
