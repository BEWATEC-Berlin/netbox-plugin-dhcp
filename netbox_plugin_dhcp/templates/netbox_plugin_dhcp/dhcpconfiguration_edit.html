{% extends 'generic/object_edit.html' %}

{% block javascript %}
{{ block.super }}
<script>
(function () {
    const vmVrfUrlTemplate = "{% url 'plugins:netbox_plugin_dhcp:ajax_connect_server_vrf' 0 %}";

    function ensureHiddenInput(form, id, name) {
        let input = document.getElementById(id);
        if (!input) {
            input = document.createElement('input');
            input.type = 'hidden';
            input.id = id;
            input.name = name;
            form.appendChild(input);
        }
        return input;
    }

    async function fetchVmVrfId(vmId) {
        const url = vmVrfUrlTemplate.replace('/0/', `/${vmId}/`);
        const response = await fetch(url);
        if (!response.ok) {
            return '';
        }
        const payload = await response.json();
        return payload && payload.vrf_id ? payload.vrf_id : '';
    }

    function triggerSelectRefresh(id) {
        const field = document.getElementById(id);
        if (!field) return;
        field.value = null;
        if (typeof $ !== 'undefined') {
            $(field).val(null).trigger('change');
        }
    }

    async function updateVrfFromConnectServer() {
        const connectServerField = document.getElementById('id_connect_server');
        const vrfField = document.getElementById('id_connect_server_vrf');
        const selectedPrefixField = document.getElementById('id_selected_prefix');
        const selectedPrefixIdField = document.getElementById('id_selected_prefix_id');
        if (!connectServerField || !vrfField) return;

        const vmId = connectServerField.value;
        if (!vmId) {
            vrfField.value = '';
            if (selectedPrefixField) selectedPrefixField.value = '';
            if (selectedPrefixIdField) selectedPrefixIdField.value = '';
            triggerSelectRefresh('id_prefix');
            triggerSelectRefresh('id_address_range');
            triggerSelectRefresh('id_router');
            triggerSelectRefresh('id_dns_servers');
            return;
        }

        const vrfId = await fetchVmVrfId(vmId);

        if (String(vrfField.value) !== String(vrfId || '')) {
            vrfField.value = vrfId || '';
            if (selectedPrefixField) selectedPrefixField.value = '';
            if (selectedPrefixIdField) selectedPrefixIdField.value = '';
            triggerSelectRefresh('id_prefix');
            triggerSelectRefresh('id_address_range');
            triggerSelectRefresh('id_router');
            triggerSelectRefresh('id_dns_servers');
        }
    }

    function onPrefixChanged() {
        const prefixField = document.getElementById('id_prefix');
        const selectedPrefixField = document.getElementById('id_selected_prefix');
        const selectedPrefixIdField = document.getElementById('id_selected_prefix_id');
        if (prefixField && selectedPrefixField && selectedPrefixIdField) {
            const option = prefixField.options[prefixField.selectedIndex];
            selectedPrefixField.value = option ? option.text.trim() : '';
            selectedPrefixIdField.value = prefixField.value || '';
        }
        triggerSelectRefresh('id_address_range');
    }

    function hideHelperField(inputId) {
        const input = document.getElementById(inputId);
        if (!input) return;
        const wrapper = input.closest('.mb-3');
        if (wrapper) {
            wrapper.style.display = 'none';
        }
    }

    document.addEventListener('DOMContentLoaded', function () {
        const form = document.querySelector('form');
        if (!form) return;

        ensureHiddenInput(form, 'id_connect_server_vrf', 'connect_server_vrf');
        ensureHiddenInput(form, 'id_selected_prefix', 'selected_prefix');
        ensureHiddenInput(form, 'id_selected_prefix_id', 'selected_prefix_id');

        const connectServerField = document.getElementById('id_connect_server');
        const prefixField = document.getElementById('id_prefix');
        if (!connectServerField) return;

        connectServerField.addEventListener('change', updateVrfFromConnectServer);
        if (typeof $ !== 'undefined') {
            $(connectServerField).on('select2:select select2:clear', updateVrfFromConnectServer);
            if (prefixField) {
                $(prefixField).on('select2:select select2:clear', onPrefixChanged);
            }
        }
        if (prefixField) {
            prefixField.addEventListener('change', onPrefixChanged);
        }
        updateVrfFromConnectServer();
    });
})();
</script>
{% endblock javascript %}
